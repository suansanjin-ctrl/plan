<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 计划板｜极简苹果风</title>
  <style>
    :root{
      --bg:#f5f5f7;
      --panel:#ffffff;
      --text:#1d1d1f;
      --sub:#6e6e73;
      --line:#e3e3e8;
      --line-strong:#d7d7dd;
      --pill:#ffffff;
      --hover:#f0f1f5;
      --accent:#111111;
      --blue:#4f7cff;
      --green:#43a36f;
      --yellow:#d9a329;
      --pink:#cf5d90;
      --purple:#7b63cf;
      --gray:#8d939c;
      --fill-blue:#edf3ff;
      --fill-green:#edf7f2;
      --fill-yellow:#fff8e9;
      --fill-pink:#fff1f6;
      --fill-purple:#f3efff;
      --fill-gray:#f1f2f4;
      --holiday:#d14a4a;
      --workday:#2f6fde;
      --radius-xl:26px;
      --radius-lg:20px;
      --radius-md:16px;
      --radius-sm:12px;
      --shadow:0 1px 2px rgba(0,0,0,.04), 0 10px 24px rgba(0,0,0,.03);
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif}
    button,select,textarea{font:inherit;color:inherit}
    .app{
      min-height:100vh;
      padding:18px;
      display:grid;
      gap:14px;
    }
    .shell{
      max-width:1450px;
      width:100%;
      margin:0 auto;
      display:grid;
      gap:14px;
    }
    .topbar{
      background:rgba(255,255,255,.9);
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      padding:16px 18px;
      display:grid;
      gap:12px;
      box-shadow:var(--shadow);
      position:sticky;
      top:12px;
      z-index:30;
      backdrop-filter:saturate(1.1) blur(6px);
    }
    .brand-row{
      display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;
    }
    .brand{
      display:grid;gap:6px;
    }
    .title{
      margin:0;
      font-size:28px;
      line-height:1;
      letter-spacing:-0.04em;
      font-weight:700;
    }
    .sub{
      color:var(--sub);
      font-size:13px;
      line-height:1.5;
    }
    .controls{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;
    }
    .seg{
      display:inline-flex;
      background:var(--pill);
      border:1px solid var(--line);
      border-radius:999px;
      padding:4px;
    }
    .seg button{
      border:0;background:transparent;padding:9px 16px;border-radius:999px;cursor:pointer;
      transition:.18s ease;
    }
    .seg button.active{
      background:var(--accent);
      color:#fff;
    }
    .picker,.btn{
      border:1px solid var(--line-strong);
      background:var(--pill);
      border-radius:999px;
      padding:10px 14px;
    }
    .btn{cursor:pointer}
    .btn:hover,.picker:hover,.swatch:hover,.seg button:hover{background:var(--hover)}
    .seg button.active:hover{background:var(--accent)}
    .palette{
      display:flex;align-items:center;gap:8px;flex-wrap:wrap;
      padding:6px 8px;border:1px solid var(--line);border-radius:999px;background:var(--pill);
    }
    .palette span{
      color:var(--sub);font-size:13px;padding:0 2px 0 4px;
    }
    .swatch{
      width:20px;height:20px;border-radius:999px;border:1px solid rgba(0,0,0,.08);cursor:pointer;position:relative;
    }
    .swatch.active::after{
      content:"";position:absolute;inset:4px;border-radius:999px;border:2px solid rgba(255,255,255,.96);
    }

    .panel{
      display:none;
      gap:14px;
      grid-template-rows:auto 1fr;
      min-height:0;
    }
    .panel.active{display:grid}
    .panel-head{
      display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;
    }
    .panel-title{
      font-size:24px;font-weight:700;letter-spacing:-0.03em;
    }
    .panel-caption{
      color:var(--sub);font-size:13px;margin-top:4px;
    }
    .inline-tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .mini{
      border:1px solid var(--line-strong);
      background:#fff;border-radius:999px;padding:8px 12px;cursor:pointer;
    }

    .snap{
      overflow:auto hidden;
      display:flex;gap:16px;scroll-snap-type:x mandatory;scrollbar-width:none;padding-bottom:8px;
      align-items:flex-start;
    }
    .snap::-webkit-scrollbar{display:none}
    .card{
      min-width:calc(100vw - 72px);
      max-width:calc(100vw - 72px);
      scroll-snap-align:start;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      padding:18px;
      box-shadow:var(--shadow);
    }
    @media (min-width:1500px){
      .card{min-width:1380px;max-width:1380px}
    }

    .card-head{
      display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;margin-bottom:14px;
    }
    .card-head h3{
      margin:0;font-size:24px;letter-spacing:-0.03em;
    }
    .card-sub{color:var(--sub);font-size:13px}

    .month-grid{
      display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;align-items:start;
    }
    .weekday{
      text-align:center;color:var(--sub);font-size:12px;padding:2px 0 4px;font-weight:600;
    }
    .day{
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      min-height:132px;
      display:flex;flex-direction:column;
      background:#fff;
      overflow:hidden;
    }
    .day.other{background:#fafafc;color:#9b9ba1}
    .day-head{
      padding:10px 12px 0;
      display:flex;justify-content:space-between;gap:10px;align-items:flex-start;
    }
    .day-left{display:grid;gap:2px;min-width:0}
    .date-num{font-size:15px;font-weight:700;line-height:1.1}
    .holiday{
      font-size:11px;line-height:1.2;color:var(--holiday);font-weight:600;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:12ch;
    }
    .worktag{font-size:10px;color:var(--workday);font-weight:700;line-height:1.1}
    .chip{
      width:10px;height:10px;border-radius:999px;border:1px solid var(--line-strong);background:transparent;flex:0 0 auto;margin-top:2px;
    }
    .input{
      width:100%;border:0;resize:none;outline:none;background:transparent;padding:8px 12px 12px;min-height:78px;line-height:1.62;overflow:hidden;
    }

    .month-footer,.week-bottom{
      margin-top:14px;
      display:grid;grid-template-columns:1fr 1fr 1.05fr;gap:10px;
    }
    .box{
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      background:#fff;
      display:grid;grid-template-rows:auto 1fr;
      overflow:hidden;
    }
    .box-title{padding:12px 12px 0;font-size:13px;font-weight:700}
    .note{
      width:100%;border:0;resize:none;outline:none;background:transparent;padding:8px 12px 12px;min-height:88px;line-height:1.62;overflow:hidden;
    }

    .week-grid{
      display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;align-items:start;
    }
    .week-col{
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      background:#fff;
      min-height:228px;
      display:grid;grid-template-rows:auto 1fr;
      overflow:hidden;
    }
    .week-col-head{
      padding:12px;border-bottom:1px solid var(--line);display:grid;gap:4px;
    }
    .week-name{font-size:14px;font-weight:700}
    .week-date{font-size:12px;color:var(--sub)}
    .week-extra{font-size:11px;color:var(--holiday);font-weight:600;min-height:14px}

    .review-layout{
      display:grid;
      gap:12px;
      overflow:auto;
      padding-right:2px;
    }
    .review-week{
      display:grid;
      grid-template-columns:1.7fr 1fr;
      gap:12px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      padding:14px;
      box-shadow:var(--shadow);
    }
    .review-left{display:grid;gap:10px}
    .review-head{
      display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap;
    }
    .review-head h3{margin:0;font-size:18px}
    .summary{color:var(--sub);font-size:12px}
    .review-days{display:grid;gap:8px}
    .review-day{
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      overflow:hidden;
      display:grid;
      grid-template-columns:138px 1fr;
      background:#fbfbfd;
      min-height:94px;
    }
    .review-day-meta{
      border-right:1px solid var(--line);
      padding:10px;background:#f6f6f8;
      display:grid;align-content:start;gap:4px;
    }
    .review-day-date{font-size:13px;font-weight:700}
    .review-day-holiday{font-size:11px;line-height:1.35;color:var(--holiday);font-weight:600}
    .review-day-body{
      width:100%;border:0;resize:none;outline:none;background:transparent;padding:10px 12px;line-height:1.62;overflow:hidden;min-height:92px;
    }
    .review-weekly{
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      background:#fbfbfd;
      display:grid;grid-template-rows:auto 1fr;
      overflow:hidden;
    }

    [data-paint="blue"]{background:var(--fill-blue)}
    [data-paint="green"]{background:var(--fill-green)}
    [data-paint="yellow"]{background:var(--fill-yellow)}
    [data-paint="pink"]{background:var(--fill-pink)}
    [data-paint="purple"]{background:var(--fill-purple)}
    [data-paint="gray"]{background:var(--fill-gray)}
    [data-paint="none"]{background:#fff}
    [data-paint="blue"] .chip{background:var(--blue);border-color:var(--blue)}
    [data-paint="green"] .chip{background:var(--green);border-color:var(--green)}
    [data-paint="yellow"] .chip{background:var(--yellow);border-color:var(--yellow)}
    [data-paint="pink"] .chip{background:var(--pink);border-color:var(--pink)}
    [data-paint="purple"] .chip{background:var(--purple);border-color:var(--purple)}
    [data-paint="gray"] .chip{background:var(--gray);border-color:var(--gray)}
    [data-paint="none"] .chip{background:transparent}

    @media (max-width:1150px){
      .month-grid,.week-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .weekday{display:none}
      .month-footer,.week-bottom,.review-week{grid-template-columns:1fr}
      .review-day{grid-template-columns:1fr}
      .review-day-meta{border-right:0;border-bottom:1px solid var(--line)}
      .card{min-width:calc(100vw - 36px);max-width:calc(100vw - 36px)}
    }
    @media (max-width:720px){
      .app{padding:10px}
      .title{font-size:24px}
      .panel-title{font-size:22px}
      .topbar{padding:14px}
      .card{padding:14px}
      .controls{align-items:flex-start}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="shell">
    <header class="topbar">
      <div class="brand-row">
        <div class="brand">
          <h1 class="title">2026 计划板</h1>
          <div class="sub">更圆润的极简苹果风。上方切换月视图、周视图、复盘；节假日直接附在日期旁边。</div>
        </div>
        <div class="controls">
          <div class="seg">
            <button class="nav-btn active" data-panel="monthPanel">月视图</button>
            <button class="nav-btn" data-panel="weekPanel">周视图</button>
            <button class="nav-btn" data-panel="reviewPanel">复盘</button>
          </div>
          <div class="palette">
            <span>标记</span>
            <button class="swatch active" data-color="none" style="background:#fff"></button>
            <button class="swatch" data-color="blue" style="background:var(--blue)"></button>
            <button class="swatch" data-color="green" style="background:var(--green)"></button>
            <button class="swatch" data-color="yellow" style="background:var(--yellow)"></button>
            <button class="swatch" data-color="pink" style="background:var(--pink)"></button>
            <button class="swatch" data-color="purple" style="background:var(--purple)"></button>
            <button class="swatch" data-color="gray" style="background:var(--gray)"></button>
          </div>
          <button id="printBtn" class="btn">打印 / 导出 PDF</button>
        </div>
      </div>
    </header>

    <section class="panel active" id="monthPanel">
      <div class="panel-head">
        <div>
          <div class="panel-title">月视图</div>
          <div class="panel-caption">横向滑动查看 12 个月；鼠标向下滚也会切到下一张。</div>
        </div>
        <div class="inline-tools">
          <button class="mini" id="monthPrev">上一个</button>
          <select class="picker" id="monthJump"></select>
          <button class="mini" id="monthNext">下一个</button>
        </div>
      </div>
      <div class="snap" id="monthSnap"></div>
    </section>

    <section class="panel" id="weekPanel">
      <div class="panel-head">
        <div>
          <div class="panel-title">周视图</div>
          <div class="panel-caption">横向滑动查看全年周视图；节假日会附在当天顶部。</div>
        </div>
        <div class="inline-tools">
          <button class="mini" id="weekPrev">上一个</button>
          <select class="picker" id="weekJump"></select>
          <button class="mini" id="weekNext">下一个</button>
        </div>
      </div>
      <div class="snap" id="weekSnap"></div>
    </section>

    <section class="panel" id="reviewPanel">
      <div class="panel-head">
        <div>
          <div class="panel-title">复盘</div>
          <div class="panel-caption">日复盘在左，对应周复盘在右。</div>
        </div>
        <div class="inline-tools">
          <button class="mini" id="reviewTop">回到顶部</button>
        </div>
      </div>
      <div class="review-layout" id="reviewLayout"></div>
    </section>
  </div>
</div>

<script>
const YEAR = 2026;
const weekdays = ["周一","周二","周三","周四","周五","周六","周日"];
const monthNames = Array.from({length:12}, (_,i)=>`${i+1}月`);
let focusedField = null;

const holidayMap = {
  "2026-01-01":"元旦","2026-01-02":"元旦","2026-01-03":"元旦",
  "2026-02-15":"春节","2026-02-16":"春节","2026-02-17":"春节","2026-02-18":"春节","2026-02-19":"春节","2026-02-20":"春节","2026-02-21":"春节","2026-02-22":"春节","2026-02-23":"春节",
  "2026-04-04":"清明节","2026-04-05":"清明节","2026-04-06":"清明节",
  "2026-05-01":"劳动节","2026-05-02":"劳动节","2026-05-03":"劳动节","2026-05-04":"劳动节","2026-05-05":"劳动节",
  "2026-06-19":"端午节","2026-06-20":"端午节","2026-06-21":"端午节",
  "2026-09-25":"中秋节","2026-09-26":"中秋节","2026-09-27":"中秋节",
  "2026-10-01":"国庆节","2026-10-02":"国庆节","2026-10-03":"国庆节","2026-10-04":"国庆节","2026-10-05":"国庆节","2026-10-06":"国庆节","2026-10-07":"国庆节"
};
const workdayMap = {
  "2026-01-04":"调休上班","2026-05-09":"调休上班","2026-09-20":"调休上班","2026-10-10":"调休上班"
};

function pad(n){return String(n).padStart(2,'0')}
function fmtDate(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function storeKey(k){return `planner_2026_topnav_${k}`}
function getText(k){return localStorage.getItem(storeKey(k)) ?? ""}
function setText(k,v){localStorage.setItem(storeKey(k),v)}
function getPaint(k){return localStorage.getItem(storeKey(k+"_paint")) ?? "none"}
function setPaint(k,v){localStorage.setItem(storeKey(k+"_paint"),v)}
function mondayIndex(jsDay){return jsDay===0?7:jsDay}

function autosize(el){
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

function applyField(el){
  el.value = getText(el.dataset.key);
  autosize(el);
  const holder = el.closest("[data-role='paintable']");
  if(holder) holder.dataset.paint = getPaint(el.dataset.key);
}
function bindField(el){
  applyField(el);
  el.addEventListener("focus", ()=>{ focusedField = el; syncPalette(); });
  el.addEventListener("input", ()=>{ setText(el.dataset.key, el.value); autosize(el); adjustContext(el); });
  el.addEventListener("blur", ()=>{ setText(el.dataset.key, el.value); autosize(el); adjustContext(el); });
}
function syncPalette(){
  if(!focusedField) return;
  const c = getPaint(focusedField.dataset.key);
  document.querySelectorAll(".swatch").forEach(s=>s.classList.toggle("active", s.dataset.color === c));
}
function paintFocused(color){
  document.querySelectorAll(".swatch").forEach(s=>s.classList.toggle("active", s.dataset.color === color));
  if(!focusedField) return;
  setPaint(focusedField.dataset.key, color);
  const holder = focusedField.closest("[data-role='paintable']");
  if(holder) holder.dataset.paint = color;
}
document.querySelectorAll(".swatch").forEach(btn=>btn.addEventListener("click", ()=>paintFocused(btn.dataset.color)));

function getWeeks(year){
  const weeks = [];
  let d = new Date(year,0,1);
  while(d.getDay() !== 1) d.setDate(d.getDate()-1);
  let no=1;
  while(true){
    const start = new Date(d);
    const days = Array.from({length:7}, (_,i)=>{const cur=new Date(start);cur.setDate(start.getDate()+i);return cur;});
    if(days.some(x=>x.getFullYear()===year)) weeks.push({weekNo:no,start,end:days[6],days}), no++;
    d.setDate(d.getDate()+7);
    if(d.getFullYear()>year && d.getMonth()>1) break;
  }
  return weeks;
}
const weeks = getWeeks(YEAR);

function buildMonthCard(monthIndex){
  const first = new Date(YEAR, monthIndex, 1);
  const last = new Date(YEAR, monthIndex+1, 0);
  const lead = mondayIndex(first.getDay()) - 1;
  const prevLast = new Date(YEAR, monthIndex, 0).getDate();
  const total = last.getDate();
  const cells = [];
  for(let i=lead-1;i>=0;i--){
    const d=prevLast-i;
    cells.push({date:new Date(YEAR, monthIndex-1, d), current:false, label:d});
  }
  for(let d=1; d<=total; d++) cells.push({date:new Date(YEAR, monthIndex, d), current:true, label:d});
  while(cells.length % 7 !== 0){
    const d = cells.length - (lead + total) + 1;
    cells.push({date:new Date(YEAR, monthIndex+1, d), current:false, label:d});
  }

  const card = document.createElement("article");
  card.className = "card month-card";
  card.dataset.index = String(monthIndex);
  card.innerHTML = `
    <div class="card-head">
      <div>
        <h3>${YEAR} 年 ${monthIndex+1} 月</h3>
        <div class="card-sub">第 ${monthIndex+1} / 12 月</div>
      </div>
      <div class="card-sub">计划写在格子里，月总结写在下方。</div>
    </div>
    <div class="month-grid weekdays-row"></div>
    <div class="month-grid days-row"></div>
    <div class="month-footer">
      <section class="box" data-role="paintable" data-paint="none">
        <div class="box-title">本月目标</div>
        <textarea class="note" data-key="month_${monthIndex+1}_goal"></textarea>
      </section>
      <section class="box" data-role="paintable" data-paint="none">
        <div class="box-title">计划 / 备注</div>
        <textarea class="note" data-key="month_${monthIndex+1}_note"></textarea>
      </section>
      <section class="box" data-role="paintable" data-paint="none">
        <div class="box-title">月总结</div>
        <textarea class="note" data-key="month_${monthIndex+1}_review"></textarea>
      </section>
    </div>
  `;
  const weekdaysRow = card.querySelector(".weekdays-row");
  weekdays.forEach(w=>{
    const div = document.createElement("div");
    div.className = "weekday";
    div.textContent = w;
    weekdaysRow.appendChild(div);
  });
  const daysRow = card.querySelector(".days-row");
  cells.forEach((c, idx)=>{
    const dateStr = fmtDate(c.date);
    const day = document.createElement("section");
    day.className = `day${c.current ? "" : " other"}`;
    day.dataset.row = String(Math.floor(idx/7));
    day.dataset.role = "paintable";
    day.dataset.paint = getPaint(`plan_${dateStr}`);
    day.innerHTML = `
      <div class="day-head">
        <div class="day-left">
          <div class="date-num">${c.label}</div>
          <div class="holiday">${holidayMap[dateStr] || ""}</div>
          <div class="worktag">${workdayMap[dateStr] || ""}</div>
        </div>
        <div class="chip"></div>
      </div>
      <textarea class="input" data-key="plan_${dateStr}"></textarea>
    `;
    daysRow.appendChild(day);
  });
  return card;
}

function buildWeekCard(w, idx){
  const card = document.createElement("article");
  card.className = "card week-card";
  card.dataset.index = String(idx);
  card.innerHTML = `
    <div class="card-head">
      <div>
        <h3>${YEAR} 年第 ${w.weekNo} 周</h3>
        <div class="card-sub">${fmtDate(w.start)} 至 ${fmtDate(w.end)}</div>
      </div>
      <div class="card-sub">第 ${idx+1} / ${weeks.length} 周</div>
    </div>
    <div class="week-grid"></div>
    <div class="week-bottom">
      <section class="box" data-role="paintable" data-paint="none">
        <div class="box-title">本周重点</div>
        <textarea class="note" data-key="week_${w.weekNo}_goal"></textarea>
      </section>
      <section class="box" data-role="paintable" data-paint="none">
        <div class="box-title">待办 / 备注</div>
        <textarea class="note" data-key="week_${w.weekNo}_todo"></textarea>
      </section>
      <section class="box" data-role="paintable" data-paint="none">
        <div class="box-title">周复盘摘要</div>
        <textarea class="note" data-key="week_${w.weekNo}_summary"></textarea>
      </section>
    </div>
  `;
  const grid = card.querySelector(".week-grid");
  w.days.forEach((d,i)=>{
    const dateStr = fmtDate(d);
    const col = document.createElement("section");
    col.className = "week-col";
    col.dataset.role = "paintable";
    col.dataset.paint = getPaint(`weekplan_${dateStr}`);
    col.innerHTML = `
      <div class="week-col-head">
        <div class="week-name">${weekdays[i]}</div>
        <div class="week-date">${dateStr}</div>
        <div class="week-extra">${holidayMap[dateStr] || workdayMap[dateStr] || ""}</div>
      </div>
      <textarea class="note" style="min-height:148px" data-key="weekplan_${dateStr}"></textarea>
    `;
    grid.appendChild(col);
  });
  return card;
}

function buildReviewPage(){
  const wrap = document.getElementById("reviewLayout");
  wrap.innerHTML = "";
  weeks.forEach(w=>{
    const sec = document.createElement("section");
    sec.className = "review-week";
    sec.innerHTML = `
      <div class="review-left">
        <div class="review-head">
          <h3>第 ${w.weekNo} 周</h3>
          <div class="summary">${fmtDate(w.start)} 至 ${fmtDate(w.end)}</div>
        </div>
        <div class="review-days"></div>
      </div>
      <aside class="review-weekly" data-role="paintable" data-paint="none">
        <div class="box-title">周复盘</div>
        <textarea class="note" style="min-height:190px" data-key="review_week_${w.weekNo}"></textarea>
      </aside>
    `;
    const list = sec.querySelector(".review-days");
    w.days.forEach((d,i)=>{
      const dateStr = fmtDate(d);
      const day = document.createElement("section");
      day.className = "review-day";
      day.dataset.role = "paintable";
      day.dataset.paint = getPaint(`review_day_${dateStr}`);
      day.innerHTML = `
        <div class="review-day-meta">
          <div class="review-day-date">${weekdays[i]}｜${dateStr}</div>
          <div class="review-day-holiday">${holidayMap[dateStr] || workdayMap[dateStr] || ""}</div>
        </div>
        <textarea class="review-day-body" data-key="review_day_${dateStr}"></textarea>
      `;
      list.appendChild(day);
    });
    wrap.appendChild(sec);
  });
  wrap.querySelectorAll("textarea").forEach(bindField);
  adjustReviewPage();
}

function adjustMonthCard(card){
  const rowMax = {};
  card.querySelectorAll(".day").forEach(day=>{
    const ta = day.querySelector("textarea");
    autosize(ta);
    const h = Math.max(132, ta.scrollHeight + 52);
    rowMax[day.dataset.row] = Math.max(rowMax[day.dataset.row] || 0, h);
  });
  card.querySelectorAll(".day").forEach(day=>day.style.minHeight = rowMax[day.dataset.row] + "px");
  card.querySelectorAll(".month-footer textarea").forEach(autosize);
}
function adjustWeekCard(card){
  let maxH = 228;
  card.querySelectorAll(".week-col textarea").forEach(ta=>{
    autosize(ta);
    maxH = Math.max(maxH, ta.scrollHeight + 64);
  });
  card.querySelectorAll(".week-col").forEach(col=>col.style.minHeight = maxH + "px");
  card.querySelectorAll(".week-bottom textarea").forEach(autosize);
}
function adjustReviewPage(){
  document.querySelectorAll("#reviewLayout textarea").forEach(autosize);
}
function adjustContext(el){
  const monthCard = el.closest(".month-card");
  const weekCard = el.closest(".week-card");
  if(monthCard) adjustMonthCard(monthCard);
  if(weekCard) adjustWeekCard(weekCard);
  if(el.closest("#reviewLayout")) adjustReviewPage();
}

function buildJumpSelects(){
  const monthJump = document.getElementById("monthJump");
  const weekJump = document.getElementById("weekJump");
  monthJump.innerHTML = "";
  weekJump.innerHTML = "";
  monthNames.forEach((m,i)=>{
    const opt = document.createElement("option");
    opt.value = String(i);
    opt.textContent = m;
    monthJump.appendChild(opt);
  });
  weeks.forEach((w,i)=>{
    const opt = document.createElement("option");
    opt.value = String(i);
    opt.textContent = `第${w.weekNo}周`;
    weekJump.appendChild(opt);
  });
}

function renderAll(){
  const monthSnap = document.getElementById("monthSnap");
  const weekSnap = document.getElementById("weekSnap");
  monthSnap.innerHTML = "";
  weekSnap.innerHTML = "";
  for(let i=0;i<12;i++) monthSnap.appendChild(buildMonthCard(i));
  weeks.forEach((w,i)=>weekSnap.appendChild(buildWeekCard(w,i)));
  document.querySelectorAll("#monthSnap textarea, #weekSnap textarea").forEach(bindField);
  document.querySelectorAll(".month-card").forEach(adjustMonthCard);
  document.querySelectorAll(".week-card").forEach(adjustWeekCard);
  buildReviewPage();
  buildJumpSelects();
}

function cardStep(wrap){
  const first = wrap.querySelector(".card");
  if(!first) return 0;
  return first.getBoundingClientRect().width + 16;
}
function currentCardIndex(wrap){
  const step = cardStep(wrap);
  return step ? Math.round(wrap.scrollLeft / step) : 0;
}
function goCard(wrap, idx){
  wrap.scrollTo({left: Math.max(0, idx * cardStep(wrap)), behavior:"smooth"});
}
function bindHorizontalWheel(wrap){
  wrap.addEventListener("wheel", e=>{
    if(Math.abs(e.deltaY) > Math.abs(e.deltaX)){
      e.preventDefault();
      wrap.scrollLeft += e.deltaY;
    }
  }, {passive:false});
}

const monthSnap = document.getElementById("monthSnap");
const weekSnap = document.getElementById("weekSnap");
bindHorizontalWheel(monthSnap);
bindHorizontalWheel(weekSnap);

document.getElementById("monthPrev").addEventListener("click", ()=>goCard(monthSnap, Math.max(0, currentCardIndex(monthSnap)-1)));
document.getElementById("monthNext").addEventListener("click", ()=>goCard(monthSnap, Math.min(11, currentCardIndex(monthSnap)+1)));
document.getElementById("weekPrev").addEventListener("click", ()=>goCard(weekSnap, Math.max(0, currentCardIndex(weekSnap)-1)));
document.getElementById("weekNext").addEventListener("click", ()=>goCard(weekSnap, Math.min(weeks.length-1, currentCardIndex(weekSnap)+1)));
document.getElementById("monthJump").addEventListener("change", e=>goCard(monthSnap, parseInt(e.target.value, 10)));
document.getElementById("weekJump").addEventListener("change", e=>goCard(weekSnap, parseInt(e.target.value, 10)));
document.getElementById("reviewTop").addEventListener("click", ()=>document.getElementById("reviewLayout").scrollTo({top:0, behavior:"smooth"}));
document.getElementById("printBtn").addEventListener("click", ()=>window.print());

document.querySelectorAll(".nav-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const target = btn.dataset.panel;
    document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active", p.id === target));
  });
});

window.addEventListener("resize", ()=>{
  document.querySelectorAll(".month-card").forEach(adjustMonthCard);
  document.querySelectorAll(".week-card").forEach(adjustWeekCard);
  adjustReviewPage();
});

renderAll();
</script>
</body>
</html>
